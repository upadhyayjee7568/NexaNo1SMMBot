<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{ title or 'Nexa SMM Panel' }}</title>
  <style>
    body{font-family:Arial,sans-serif;background:#0f172a;color:#e2e8f0;margin:0}
    header{padding:14px 20px;background:#111827;border-bottom:1px solid #334155}
    .container{padding:20px;max-width:1100px;margin:auto}
    .card{background:#1e293b;padding:16px;border-radius:10px;margin-bottom:14px}
    a{color:#7dd3fc} table{width:100%;border-collapse:collapse} td,th{padding:8px;border-bottom:1px solid #334155}
    input,button,select{padding:8px;border-radius:6px;border:1px solid #334155;background:#0b1220;color:#e2e8f0}
    button{cursor:pointer}
  </style>
</head>
<body>
<header><strong>Nexa SMM Panel</strong> | <a href="/app">Customer App</a> | <a href="/admin">Admin Dashboard</a></header>
<div class="container">{% block content %}{% endblock %}</div>
</body>
</html>
