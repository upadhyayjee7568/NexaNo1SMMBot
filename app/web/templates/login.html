{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Web Login</h2>
  <p>Login with Telegram ID (internal admin/customer panel auth).</p>
  <form method="post" action="/web/login">
    <input name="telegram_id" placeholder="Telegram ID" required>
    <button>Login</button>
  </form>
</div>
{% if result %}<div class="card"><pre>{{ result }}</pre></div>{% endif %}
{% endblock %}
