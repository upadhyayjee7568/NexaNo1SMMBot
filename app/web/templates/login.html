{% extends "base.html" %}
{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 80vh; padding: 1rem;">
  <div class="card" style="max-width: 420px; width: 100%;">
    <div style="text-align: center; margin-bottom: 2rem;">
      <div style="font-size: 3rem; margin-bottom: 1rem;">🚀</div>
      <h1 class="card-title" style="margin-bottom: 0.5rem;">Nexa SMM Panel</h1>
      <p class="card-subtitle">Login to access your dashboard</p>
    </div>

    {% if error %}
      <div class="alert alert-danger" style="margin-bottom: 1.5rem;">
        {{ error }}
      </div>
    {% endif %}

    {% if result %}
      <div class="alert alert-info" style="margin-bottom: 1.5rem;">
        {{ result }}
      </div>
    {% endif %}

    <form method="post" action="/web/login">
      <div class="form-group">
        <label for="telegram_id">Telegram ID</label>
        <input 
          type="number" 
          id="telegram_id"
          name="telegram_id" 
          placeholder="Enter your Telegram ID (e.g., 123456789)" 
          required
          style="font-size: 1rem;"
        >
        <small style="color: var(--text-muted); font-size: 0.8rem; margin-top: 0.5rem; display: block;">
          Use the same Telegram ID you use with the bot
        </small>
      </div>
      <div class="button-group" style="margin-top: 1.5rem;">
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.9rem;">
          Login
        </button>
      </div>
    </form>

    <div style="margin-top: 2rem; text-align: center; padding-top: 1.5rem; border-top: 1px solid var(--border);">
      <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 0.5rem;">
        New user? Start the bot first:
      </p>
      <a href="https://t.me/NexaNo1SMMBot" target="_blank" class="btn btn-secondary" style="display: inline-block;">
        Open Telegram Bot
      </a>
    </div>
  </div>
</div>
{% endblock %}
