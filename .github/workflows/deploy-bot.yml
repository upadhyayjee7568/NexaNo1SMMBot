name: Deploy Telegram Bot

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render bot deploy hook
        env:
          RENDER_BOT_DEPLOY_HOOK_URL: ${{ secrets.RENDER_BOT_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "${RENDER_BOT_DEPLOY_HOOK_URL}" ]; then
            echo "Missing secret: RENDER_BOT_DEPLOY_HOOK_URL"
            exit 1
          fi
          curl -fsS -X POST "$RENDER_BOT_DEPLOY_HOOK_URL"

      - name: Deployment trigger complete
        run: echo "Render bot deploy hook triggered successfully"
